<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Formulário de Carregamento FOB</title><style>:root{--primary:#2563eb;--bg:#f8fafc;--text:#1e293b;--error:#dc2626;--success:#16a34a}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding:20px}main{max-width:800px;margin:0 auto;background:#fff;padding:30px;border-radius:8px;box-shadow:0 4px 6px -1px rgba(0,0,0,0.1)}.guide{background:#eff6ff;padding:20px;border-left:4px solid var(--primary);margin-bottom:30px}h1,h2{color:var(--primary)}form{display:flex;flex-direction:column;gap:15px}.form-group{display:flex;flex-direction:column;gap:5px}input,select{padding:10px;border:1px solid #cbd5e1;border-radius:4px}button{background:var(--primary);color:#fff;padding:12px;border:none;border-radius:4px;cursor:pointer;font-weight:bold}button:disabled{opacity:0.7}.hidden{display:none}.msg{padding:10px;border-radius:4px;margin-top:10px;display:none}</style></head><body><main><h1>Guia de ICMS e Instruções de Carregamento (FOB)</h1><div class="guide"><h2>Regras Gerais</h2><ul><li>ICMS: Responsabilidade do transportador conforme legislação vigente.</li><li>Documentos: Obrigatório apresentação de CNH e CRLV original.</li><li>Veículos: Devem estar em perfeitas condições de conservação.</li></ul></div><form id="fobForm"><div class="form-group"><label>Tipo de Cadastro</label><select id="tipoCadastro" required><option value="">Selecione...</option><option value="PF">Pessoa Física</option><option value="PJ">Pessoa Jurídica</option></select></div><div id="pjFields" class="hidden"><div class="form-group"><label>CNPJ da Transportadora</label><input type="text" id="cnpj" placeholder="00.000.000/0000-00"></div><div class="form-group"><label>E-mail da Transportadora</label><input type="email" id="emailTransp"></div></div><div class="form-group"><label>Nome do Motorista</label><input type="text" id="nomeMotorista" required></div><div class="form-group"><label>CPF do Motorista</label><input type="text" id="cpf" placeholder="000.000.000-00" required></div><div class="form-group"><label>Telefone</label><input type="tel" id="telefone" placeholder="(00) 00000-0000" required></div><div class="form-group"><label>Tipo de Caminhão</label><select id="tipoCaminhao" required><option value="">Selecione...</option><option value="truck">Truck</option><option value="carreta">Carreta</option><option value="bitrem">Bitrem</option><option value="graneleira">Graneleira</option><option value="sider">Sider</option><option value="bau">Baú</option><option value="truck_graneleiro">Truck Graneleiro</option></select></div><div id="placasContainer" class="hidden"><div class="form-group"><label>Quantidade de Placas</label><input type="number" id="qtdPlacas" min="1"></div><div class="form-group"><label>Placa do Veículo</label><input type="text" id="placa" placeholder="ABC-1234" required></div></div><div class="form-group"><label>PIS (Opcional)</label><input type="text" id="pis"></div><button type="submit" id="submitBtn">Enviar Cadastro</button><div id="msg" class="msg"></div></form></main><script>const form=document.getElementById('fobForm');const tipoCadastro=document.getElementById('tipoCadastro');const tipoCaminhao=document.getElementById('tipoCaminhao');tipoCadastro.addEventListener('change',e=>{document.getElementById('pjFields').classList.toggle('hidden',e.target.value!=='PJ');});tipoCaminhao.addEventListener('change',e=>{document.getElementById('placasContainer').classList.toggle('hidden',!e.target.value);});const mask=(v,p)=>{v=v.replace(/\D/g,'');if(p==='cpf')return v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/,'$1.$2.$3-$4');if(p==='cnpj')return v.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/,'$1.$2.$3/$4-$5');if(p==='tel')return v.replace(/(\d{2})(\d{5})(\d{4})/,'($1) $2-$3');if(p==='placa')return v.replace(/([A-Z]{3})(\d{4})/,'$1-$2').toUpperCase();return v;};document.getElementById('cpf').addEventListener('input',e=>e.target.value=mask(e.target.value,'cpf'));document.getElementById('cnpj').addEventListener('input',e=>e.target.value=mask(e.target.value,'cnpj'));document.getElementById('telefone').addEventListener('input',e=>e.target.value=mask(e.target.value,'tel'));document.getElementById('placa').addEventListener('input',e=>e.target.value=mask(e.target.value,'placa'));form.addEventListener('submit',async e=>{e.preventDefault();const btn=document.getElementById('submitBtn');const msg=document.getElementById('msg');btn.disabled=true;btn.innerText='Enviando...';try{const response=await fetch('https://script.google.com/macros/s/AKfycbxdroL80Bpf6bGqqkSsaeFWycZTqveJzM3h1FkEKHqcwVjjkWnWQDBjWWUJ43cgFdfl/exec',{method:'POST',body:JSON.stringify(Object.fromEntries(new FormData(form)))});msg.innerText='Sucesso!';msg.style.display='block';msg.style.color='var(--success)';}catch(err){msg.innerText='Erro ao enviar.';msg.style.display='block';msg.style.color='var(--error)';}finally{btn.disabled=false;btn.innerText='Enviar Cadastro';}});</script></body></html>
