<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Formulário de Carregamento FOB</title><style>:root{--primary:#2563eb;--bg:#f8fafc;--text:#1e293b}.container{max-width:600px;margin:2rem auto;padding:2rem;background:#fff;border-radius:8px;box-shadow:0 4px 6px -1px rgba(0,0,0,0.1)}h1,h2{color:var(--text)}label{display:block;margin-top:1rem;font-weight:600}.form-group{margin-bottom:1rem}input,select{width:100%;padding:0.75rem;margin-top:0.25rem;border:1px solid #cbd5e1;border-radius:4px}button{width:100%;padding:1rem;background:var(--primary);color:#fff;border:none;border-radius:4px;margin-top:2rem;cursor:pointer}.hidden{display:none}.msg{margin-top:1rem;padding:1rem;border-radius:4px;display:none}</style></head><body><div class="container"><h1>Carregamento FOB</h1><section><h2>Guia de Informações</h2><p>Preencha os dados abaixo para solicitar o carregamento. Certifique-se de que as informações do veículo e motorista estejam corretas.</p></section><form id="fobForm"><section><h2>Dados do Cadastro</h2><label>Tipo de Cadastro</label><select id="tipoCadastro" required><option value="PF">Pessoa Física</option><option value="PJ">Pessoa Jurídica</option></select><div id="pjFields" class="hidden"><label>CNPJ</label><input type="text" id="cnpj" placeholder="00.000.000/0000-00"><label>Email Transportadora</label><input type="email" id="emailTransp"></div><label>Nome Motorista</label><input type="text" id="nomeMotorista" required><label>CPF Motorista</label><input type="text" id="cpfMotorista" required><label>Email</label><input type="email" id="email" required><label>Telefone</label><input type="tel" id="telefone" required></section><section><h2>Veículo</h2><label>Tipo de Caminhão</label><select id="tipoCaminhao" required><option value="">Selecione...</option><option value="1">Truck</option><option value="2">Carreta</option><option value="3">Bitrem</option><option value="1">Graneleira</option><option value="2">Sider</option><option value="1">Baú</option><option value="1">Truck Graneleiro</option></select><div id="placasContainer"></div><label>PIS (Opcional)</label><input type="text" id="pis"></section><button type="submit" id="submitBtn">Enviar Solicitação</button></form><div id="msg" class="msg"></div></div><script>const form=document.getElementById('fobForm');const tipoCadastro=document.getElementById('tipoCadastro');const tipoCaminhao=document.getElementById('tipoCaminhao');const placasContainer=document.getElementById('placasContainer');tipoCadastro.addEventListener('change',e=>{document.getElementById('pjFields').classList.toggle('hidden',e.target.value!=='PJ')});tipoCaminhao.addEventListener('change',e=>{const count=parseInt(e.target.value)||0;placasContainer.innerHTML='';for(let i=1;i<=count;i++){placasContainer.innerHTML+=`<label>Placa ${i}</label><input type="text" class="placa" placeholder="ABC-1234" required maxlength="8">`}});form.addEventListener('submit',async e=>{e.preventDefault();const btn=document.getElementById('submitBtn');btn.disabled=true;btn.textContent='Enviando...';try{const data={...Object.fromEntries(new FormData(form))};await fetch('https://script.google.com/macros/s/AKfycbxdroL80Bpf6bGqqkSsaeFWycZTqveJzM3h1FkEKHqcwVjjkWnWQDBjWWUJ43cgFdfl/exec',{method:'POST',body:JSON.stringify(data)});document.getElementById('msg').textContent='Sucesso!';document.getElementById('msg').style.display='block'}catch(err){document.getElementById('msg').textContent='Erro ao enviar.';document.getElementById('msg').style.display='block'}finally{btn.disabled=false;btn.textContent='Enviar'}})</script></body></html>
