<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Formulário de Carregamento FOB</title><style>:root{--primary:#2563eb;--bg:#f8fafc;--text:#1e293b}.container{max-width:600px;margin:2rem auto;padding:2rem;background:#fff;border-radius:8px;box-shadow:0 4px 6px -1px rgba(0,0,0,0.1)}h1{font-size:1.5rem;margin-bottom:1.5rem;color:var(--text)}.form-group{margin-bottom:1rem}.form-group label{display:block;margin-bottom:.5rem;font-weight:600}.form-control{width:100%;padding:.75rem;border:1px solid #cbd5e1;border-radius:4px;box-sizing:border-box}button{width:100%;padding:1rem;background:var(--primary);color:#fff;border:none;border-radius:4px;cursor:pointer;font-weight:700}button:disabled{opacity:.7}.hidden{display:none}.msg{padding:1rem;margin-top:1rem;border-radius:4px;display:none}</style></head><body><div class="container"><h1>Carregamento FOB</h1><form id="fobForm"><section><h2>1. Informações</h2><p>Preencha os dados para agendamento.</p></section><section><h2>2. Cadastro</h2><div class="form-group"><label>Tipo de Cadastro</label><select id="tipoCadastro" class="form-control" required><option value="PF">Pessoa Física</option><option value="PJ">Pessoa Jurídica</option></select></div><div id="fieldsPJ" class="hidden"><div class="form-group"><label>CNPJ</label><input type="text" id="cnpj" class="form-control" placeholder="00.000.000/0000-00"></div><div class="form-group"><label>Email Transportadora</label><input type="email" class="form-control"></div></div><div class="form-group"><label>Nome Motorista</label><input type="text" id="nomeMotorista" class="form-control" required></div><div class="form-group"><label>CPF Motorista</label><input type="text" id="cpf" class="form-control" required></div><div class="form-group"><label>Telefone</label><input type="tel" id="telefone" class="form-control" required></div></section><section><h2>3. Veículo</h2><div class="form-group"><label>Tipo de Caminhão</label><select id="tipoCaminhao" class="form-control" required><option value="">Selecione...</option><option value="truck">Truck</option><option value="carreta">Carreta</option><option value="bitrem">Bitrem</option><option value="graneleira">Graneleira</option><option value="sider">Sider</option><option value="bau">Baú</option><option value="truck_graneleiro">Truck Graneleiro</option></select></div><div id="placasContainer"></div><div class="form-group"><label>PIS (Opcional)</label><input type="text" class="form-control"></div></section><button type="submit" id="submitBtn">Enviar</button></form><div id="msg" class="msg"></div></div><script>const form=document.getElementById('fobForm');const tipoCadastro=document.getElementById('tipoCadastro');const tipoCaminhao=document.getElementById('tipoCaminhao');const placasContainer=document.getElementById('placasContainer');const mapping={truck:1,carreta:2,bitrem:3,graneleira:1,sider:2,bau:1,truck_graneleiro:1};tipoCadastro.addEventListener('change',e=>{document.getElementById('fieldsPJ').classList.toggle('hidden',e.target.value!=='PJ');});tipoCaminhao.addEventListener('change',e=>{const count=mapping[e.target.value]||0;placasContainer.innerHTML='';for(let i=1;i<=count;i++){placasContainer.innerHTML+='<div class="form-group"><label>Placa '+i+'</label><input type="text" class="form-control placa" placeholder="ABC-1234" required></div>';}});form.addEventListener('submit',async e=>{e.preventDefault();const btn=document.getElementById('submitBtn');btn.disabled=true;btn.innerText='Enviando...';try{const response=await fetch('https://script.google.com/macros/s/AKfycbxdroL80Bpf6bGqqkSsaeFWycZTqveJzM3h1FkEKHqcwVjjkWnWQDBjWWUJ43cgFdfl/exec',{method:'POST',body:new FormData(form)});if(response.ok)alert('Sucesso!');}catch(err){alert('Erro ao enviar');}finally{btn.disabled=false;btn.innerText='Enviar';}});</script></body></html>
